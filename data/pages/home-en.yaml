      publication:
        type: Featured preprint
        title: 'GeoRouteNet: Geometry-Enhanced Neural Solver for Euclidean TSP'
        summary: A non-autoregressive neural solver that injects geometric inductive bias into node, edge, and attention representations, trained with multi-candidate self-comparison reinforcement learning.
        page_url: publications/georoutenet/
        paper_url: https://arxiv.org/abs/2606.22776

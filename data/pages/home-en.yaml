    content:
      username: me
      location: Jingzhou, China
      eyebrow: Neural Combinatorial Optimization
      role: Aspiring researcher working across geometric deep learning and reinforcement learning.
      role_short: Neural optimization researcher.
      intro: |-
        I develop learning-based methods for hard combinatorial problems. My undergraduate thesis, **GeoRouteNet**, studies how explicit geometric structure can improve neural solvers for the Euclidean Traveling Salesman Problem.
      intro_short: I build geometry-aware neural solvers for hard combinatorial problems.
      availability: Open to Research Assistant opportunities and research collaborations.
      availability_short: Open to RA opportunities.
      research_intro: |-
        My current work asks a practical question: how can neural models learn useful optimization structure without giving up reliable search? I am especially interested in representations that preserve geometry, reinforcement-learning objectives with stronger training signals, and generalization beyond the training distribution.
      contact_intro: |-
        I am seeking Research Assistant opportunities in neural combinatorial optimization, deep learning, and reinforcement learning. For research discussions or collaboration, email is the best way to reach me.

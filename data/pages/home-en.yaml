          - label: TSP100 gap
            value: 1.26%
          - label: TSPLIB gap
            value: 3.60%
      project:
        type: Independent project
        title: 'poetryGPT: Decoder-only Transformer for Chinese Poetry'
        summary: A character-level language model built in PyTorch, covering data cleaning, transformer training, and controllable autoregressive decoding for classical Chinese poetry.
        code_url: https://github.com/stardustlil/poetryGPT
        image_alt: Typeset sample of a classical Chinese poem generated by poetryGPT
        facts:
          - 7 transformer layers
          - Approximately 14M parameters
          - 2.2M-character training corpus

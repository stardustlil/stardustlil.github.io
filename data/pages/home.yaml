    content:
      username: me
      location: 中国荆州
      eyebrow: 神经组合优化
      role: 关注几何深度学习与强化学习的青年研究者。
      role_short: 神经优化研究者。
      intro: |-
        我致力于研究面向困难组合问题的学习方法。本科毕业论文 **GeoRouteNet** 探索了如何利用显式几何结构改进欧几里得旅行商问题的神经求解器。
      intro_short: 我研究面向困难组合问题的几何增强神经求解方法。
      availability: 正在寻求研究助理职位，也欢迎科研合作与交流。
      availability_short: 正在寻找研究助理机会。
      research_intro: |-
        我目前关注一个实际问题：神经模型如何在不牺牲可靠搜索能力的前提下，学习有效的优化结构。具体兴趣包括保留几何信息的表示方法、提供更强训练信号的强化学习目标，以及模型在训练分布之外的泛化能力。
      contact_intro: |-
        我正在寻找神经组合优化、深度学习和强化学习方向的研究助理机会。如需讨论研究问题或合作，欢迎通过邮件联系。

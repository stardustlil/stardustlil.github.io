  - block: markdown
    content:
      title: '🔬 研究方向'
      subtitle: ''
      text: |-
        我对神经组合优化、深度学习和强化学习充满热情。我的本科毕业论文 GeoRouteNet 探索了针对欧几里得旅行商问题的几何增强神经求解器。

        目前我正在寻求研究助理（RA）职位，希望能够在组合优化与深度学习领域做出贡献。

        欢迎联系交流。
    design:
      columns: '1'

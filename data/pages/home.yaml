      publication:
        type: 代表预印本
        title: GeoRouteNet：面向欧几里得 TSP 的几何增强神经求解器
        summary: 将几何归纳偏置注入节点、边与注意力表示，并采用多候选自比较强化学习训练的非自回归神经求解器。
        page_url: publications/georoutenet/
        paper_url: https://arxiv.org/abs/2606.22776
        code_url: https://github.com/stardustlil/GeoRouteNet
        image_alt: 带有 GeoRouteNet 实验结果标注的旅行商问题路线图
        results:
          - label: TSP50 差距
            value: 0.32%
          - label: TSP100 差距
            value: 1.26%
          - label: TSPLIB 差距
            value: 3.60%
      project:
        type: 独立项目
        title: poetryGPT：面向中文古诗生成的 Decoder-only Transformer
        summary: 使用 PyTorch 构建的字符级语言模型，覆盖数据清洗、Transformer 训练以及面向古诗词的可控自回归解码。
        code_url: https://github.com/stardustlil/poetryGPT
        image_alt: poetryGPT 生成的中文古诗排版样例
        facts:
          - 7 层 Transformer
          - 约 1400 万参数
          - 220 万字符训练语料
      campus:
        period: 2022 - 2026
        organization: 长江大学 ICPC 集训队
        title: 程序设计竞赛训练
        summary: 系统训练动态规划、图论、计算几何、数论与字符串算法，强化算法建模和问题求解能力。

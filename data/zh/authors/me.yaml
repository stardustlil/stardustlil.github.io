    summary: |
      **毕业论文：GeoRouteNet —— 面向欧几里得 TSP 的几何增强神经求解器**
      * 提出了一种将几何归纳偏置注入 GNN 节点、边和注意力表示的非自回归神经求解器。
      * 设计了一种多候选自比较强化学习策略。在 TSP50/TSP100（Beam-1000）上实现了 0.32% / 1.26% 的最优性差距，显著超越 baseline。
      * 获评**校级优秀毕业论文**。预印本已发布于 [arXiv:2606.22776](https://arxiv.org/abs/2606.22776)。

